<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="theme-color" content="#080808"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black"/>
  <title>Live Stream</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --red: #ff2233;
      --bg: #080808;
      --text: #f0f0f0;
      --muted: #555;
    }

    html, body {
      width: 100%;
      min-height: 100vh;
      min-height: 100dvh;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ===================== */
    /*   PAGE SYSTEM         */
    /* ===================== */
    .page {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.4s ease, transform 0.4s ease;
      padding: 24px 16px;
    }

    .page.hidden {
      opacity: 0;
      pointer-events: none;
      transform: scale(0.97);
    }

    /* ===================== */
    /*   LANDING PAGE        */
    /* ===================== */
    #landingPage::before {
      content: '';
      position: fixed;
      width: min(600px, 100vw);
      height: min(600px, 100vw);
      background: radial-gradient(circle, rgba(255,34,51,0.08) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      animation: breathe 4s ease-in-out infinite;
      z-index: 0;
    }

    @keyframes breathe {
      0%, 100% { opacity: 0.5; transform: translate(-50%,-50%) scale(1); }
      50%       { opacity: 1;   transform: translate(-50%,-50%) scale(1.15); }
    }

    .landing-inner {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(24px, 5vw, 48px);
      width: 100%;
      max-width: 480px;
      animation: fadeUp 0.8s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .brand {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(56px, 18vw, 96px);
      letter-spacing: 0.08em;
      line-height: 1;
      text-align: center;
    }
    .brand span { color: var(--red); }

    .tagline {
      font-size: clamp(10px, 2.8vw, 13px);
      letter-spacing: 0.18em;
      color: var(--muted);
      text-transform: uppercase;
      text-align: center;
      margin-top: -18px;
    }

    .divider {
      width: 1px;
      height: clamp(24px, 4vw, 40px);
      background: linear-gradient(to bottom, transparent, var(--muted), transparent);
    }

    /* LIVE BUTTON */
    .live-btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: clamp(10px, 3vw, 14px);
      padding: clamp(18px, 4.5vw, 22px) clamp(40px, 12vw, 60px);
      background: var(--red);
      color: #fff;
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(28px, 8vw, 34px);
      letter-spacing: 0.15em;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      width: min(300px, 80vw);
      outline: none;
      -webkit-appearance: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      transition: background 0.2s, transform 0.15s;
      animation: pulse-shadow 2s ease-in-out infinite;
    }

    .live-btn:hover  { background: #ff0011; transform: scale(1.03); }
    .live-btn:active { transform: scale(0.97); background: #cc0011; }

    @keyframes pulse-shadow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,34,51,0.5), 0 8px 40px rgba(255,34,51,0.25); }
      50%       { box-shadow: 0 0 0 16px rgba(255,34,51,0), 0 8px 60px rgba(255,34,51,0.45); }
    }

    .live-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px
      );
      border-radius: 6px;
      pointer-events: none;
    }

    .live-dot {
      width: clamp(11px, 3vw, 14px);
      height: clamp(11px, 3vw, 14px);
      border-radius: 50%;
      background: #fff;
      position: relative;
      flex-shrink: 0;
    }

    .live-dot::before,
    .live-dot::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: rgba(255,255,255,0.4);
      width: 100%; height: 100%;
      animation: ripple 2s ease-out infinite;
    }
    .live-dot::after { animation-delay: 0.65s; }

    @keyframes ripple {
      0%   { width: 100%; height: 100%; opacity: 0.8; }
      100% { width: 320%; height: 320%; opacity: 0; }
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: clamp(10px, 2.5vw, 12px);
      letter-spacing: 0.12em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--red);
      flex-shrink: 0;
      animation: blink 1.2s step-start infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    .viewer-badge {
      display: flex;
      align-items: center;
      gap: 7px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 100px;
      padding: clamp(6px,1.5vw,8px) clamp(12px,3vw,16px);
      font-size: clamp(10px, 2.4vw, 12px);
      letter-spacing: 0.1em;
      color: #666;
      text-transform: uppercase;
    }

    .viewer-badge svg { width: 13px; height: 13px; fill: #666; flex-shrink: 0; }

    /* Corner labels */
    .corner {
      position: fixed;
      font-size: 10px;
      letter-spacing: 0.14em;
      color: #2a2a2a;
      font-family: 'DM Sans', monospace;
      text-transform: uppercase;
      z-index: 5;
    }
    .corner.tl { top: 18px; left: 20px; }
    .corner.tr { top: 18px; right: 20px; }
    .corner.bl { bottom: 18px; left: 20px; }
    .corner.br { bottom: 18px; right: 20px; }

    /* ===================== */
    /*   PLAYER PAGE         */
    /* ===================== */
    #playerPage {
      background: #000;
      padding: 0;
      justify-content: flex-start;
    }

    .player-header {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: #0d0d0d;
      border-bottom: 1px solid #1a1a1a;
      flex-shrink: 0;
      z-index: 10;
    }

    .player-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(18px, 5vw, 24px);
      letter-spacing: 0.1em;
      color: var(--text);
    }

    .player-title .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--red);
      animation: blink 1.2s step-start infinite;
      flex-shrink: 0;
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      color: #aaa;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      letter-spacing: 0.08em;
      padding: 7px 12px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      transition: background 0.2s;
      text-transform: uppercase;
    }
    .back-btn:hover  { background: rgba(255,255,255,0.1); }
    .back-btn:active { background: rgba(255,255,255,0.04); }
    .back-btn svg { width: 14px; height: 14px; fill: #aaa; }

    /* Video wrapper */
    .video-wrapper {
      width: 100%;
      position: relative;
      background: #000;
      flex-shrink: 0;
    }

    /* 16:9 aspect ratio */
    .video-wrapper::before {
      content: '';
      display: block;
      padding-top: 56.25%;
    }

    .video-wrapper iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      pointer-events: all;
    }

    /* Overlay to block right-click on iframe */
    .iframe-shield {
      position: absolute;
      inset: 0;
      z-index: 2;
      background: transparent;
      pointer-events: none;
    }

    /* Stream info below video */
    .stream-info {
      width: 100%;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: #0a0a0a;
      border-top: 1px solid #1a1a1a;
    }

    .stream-info-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(20px, 5vw, 26px);
      letter-spacing: 0.06em;
      color: var(--text);
    }

    .stream-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: var(--red);
      color: #fff;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 3px 9px;
      border-radius: 3px;
    }

    .live-badge-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #fff;
      animation: blink 1.2s step-start infinite;
    }

    .stream-meta-text {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    /* Tablet / Desktop — side by side */
    @media (min-width: 768px) {
      #playerPage { flex-direction: column; }
      .video-wrapper { max-width: 900px; margin: 0 auto; width: 100%; }
      .stream-info { max-width: 900px; margin: 0 auto; width: 100%; border-radius: 0 0 8px 8px; }
    }

    /* Very small phones */
    @media (max-width: 360px) {
      .corner { display: none; }
      .live-btn { width: 88vw; }
    }

    /* Landscape mobile */
    @media (max-height: 500px) and (orientation: landscape) {
      .landing-inner { gap: 14px; }
      .divider { height: 16px; }
      .brand { font-size: 42px; }
      .corner.bl, .corner.br { display: none; }
    }
  </style>
</head>
<body>

  <!-- Corner labels (landing only) -->
  <span class="corner tl" id="cornerTL">Stream v1.0</span>
  <span class="corner tr" id="cornerTR">HD · 1080p</span>
  <span class="corner bl" id="cornerBL">Owncast</span>
  <span class="corner br" id="clock"></span>

  <!-- ==================== -->
  <!-- LANDING PAGE         -->
  <!-- ==================== -->
  <div class="page" id="landingPage">
    <div class="landing-inner">
      <div>
        <div class="brand">Watch <span>Live</span></div>
        <div class="tagline">Live Broadcast — Join Now</div>
      </div>

      <div class="divider"></div>

      <button class="live-btn" id="liveBtn" onclick="showPlayer()">
        <span class="live-dot"></span>
        LIVE
      </button>

      <div class="status">
        <span class="status-dot"></span>
        Stream is live · Tap to watch
      </div>

      <div class="viewer-badge">
        <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zm0 12.5c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
        Open to all viewers
      </div>
    </div>
  </div>

  <!-- ==================== -->
  <!-- PLAYER PAGE          -->
  <!-- ==================== -->
  <div class="page hidden" id="playerPage">

    <div class="player-header">
      <div class="player-title">
        <span class="dot"></span>
        LIVE NOW
      </div>
      <button class="back-btn" onclick="showLanding()">
        <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
        Back
      </button>
    </div>

    <div class="video-wrapper">
      <iframe
        id="streamFrame"
        src=""
        allowfullscreen
        allow="autoplay; fullscreen"
        scrolling="no">
      </iframe>
      <div class="iframe-shield"></div>
    </div>

    <div class="stream-info">
      <div class="stream-info-title">Live Broadcast</div>
      <div class="stream-meta">
        <span class="live-badge">
          <span class="live-badge-dot"></span>
          Live
        </span>
        <span class="stream-meta-text">Streaming now · Watch only on this page</span>
      </div>
    </div>

  </div>

  <script>
    // Encoded stream embed URL
    const _e = atob('aHR0cDovLzEzOS4xODAuMTU2LjExNjo4MDgwL2VtYmVkL3ZpZGVv');

    // Block right-click everywhere
    document.addEventListener('contextmenu', e => e.preventDefault());

    // Block text selection
    document.addEventListener('selectstart', e => e.preventDefault());

    // Clock
    function updateClock() {
      document.getElementById('clock').textContent =
        new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }
    updateClock();
    setInterval(updateClock, 1000);

    // Show player page
    function showPlayer() {
      // Load iframe only when user clicks
      document.getElementById('streamFrame').src = _e;
      document.getElementById('landingPage').classList.add('hidden');
      document.getElementById('playerPage').classList.remove('hidden');
      // Hide corners
      ['cornerTL','cornerTR','cornerBL'].forEach(id => {
        document.getElementById(id).style.display = 'none';
      });
      // Prevent browser back button from revealing URL
      history.pushState({ page: 'player' }, '', '#watch');
    }

    // Show landing page
    function showLanding() {
      // Unload iframe to stop stream
      document.getElementById('streamFrame').src = '';
      document.getElementById('playerPage').classList.add('hidden');
      document.getElementById('landingPage').classList.remove('hidden');
      // Restore corners
      ['cornerTL','cornerTR','cornerBL'].forEach(id => {
        document.getElementById(id).style.display = '';
      });
      history.pushState({ page: 'landing' }, '', window.location.pathname);
    }

    // Handle browser back button
    window.addEventListener('popstate', (e) => {
      if (document.getElementById('playerPage').classList.contains('hidden') === false) {
        showLanding();
      }
    });
  </script>

</body>
</html>
