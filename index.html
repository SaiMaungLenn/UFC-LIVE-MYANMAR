<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="theme-color" content="#080808"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black"/>
  <title>Live Stream</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --red: #ff2233;
      --bg: #080808;
      --text: #f0f0f0;
      --muted: #555;
    }

    html, body {
      width: 100%;
      min-height: 100vh;
      min-height: 100dvh;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      padding: 24px 16px;
    }

    body::before {
      content: '';
      position: fixed;
      width: min(600px, 100vw);
      height: min(600px, 100vw);
      background: radial-gradient(circle, rgba(255,34,51,0.08) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      animation: breathe 4s ease-in-out infinite;
      z-index: 0;
    }

    @keyframes breathe {
      0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
      50%       { opacity: 1; transform: translate(-50%, -50%) scale(1.15); }
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      opacity: 0.4;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(24px, 5vw, 48px);
      width: 100%;
      max-width: 480px;
      animation: fadeUp 0.8s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .brand {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(56px, 18vw, 96px);
      letter-spacing: 0.08em;
      color: var(--text);
      line-height: 1;
      text-align: center;
    }

    .brand span { color: var(--red); }

    .tagline {
      font-size: clamp(10px, 2.8vw, 13px);
      letter-spacing: 0.18em;
      color: var(--muted);
      text-transform: uppercase;
      text-align: center;
      margin-top: -18px;
      padding: 0 8px;
    }

    .divider {
      width: 1px;
      height: clamp(24px, 4vw, 40px);
      background: linear-gradient(to bottom, transparent, var(--muted), transparent);
    }

    .live-btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: clamp(10px, 3vw, 14px);
      padding: clamp(18px, 4.5vw, 22px) clamp(40px, 12vw, 60px);
      background: var(--red);
      color: #fff;
      text-decoration: none;
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(28px, 8vw, 34px);
      letter-spacing: 0.15em;
      border-radius: 6px;
      cursor: pointer;
      width: min(300px, 80vw);
      transition: background 0.2s, transform 0.15s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      user-select: none;
      animation: pulse-shadow 2s ease-in-out infinite;
    }

    .live-btn:hover  { background: #ff0011; transform: scale(1.03); }
    .live-btn:active { transform: scale(0.97); background: #cc0011; }

    @keyframes pulse-shadow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,34,51,0.5), 0 8px 40px rgba(255,34,51,0.25); }
      50%       { box-shadow: 0 0 0 16px rgba(255,34,51,0), 0 8px 60px rgba(255,34,51,0.45); }
    }

    .live-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px
      );
      border-radius: 6px;
      pointer-events: none;
    }

    .live-dot {
      width: clamp(11px, 3vw, 14px);
      height: clamp(11px, 3vw, 14px);
      border-radius: 50%;
      background: #fff;
      position: relative;
      flex-shrink: 0;
    }

    .live-dot::before,
    .live-dot::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: rgba(255,255,255,0.4);
      width: 100%; height: 100%;
      animation: ripple 2s ease-out infinite;
    }

    .live-dot::after { animation-delay: 0.65s; }

    @keyframes ripple {
      0%   { width: 100%; height: 100%; opacity: 0.8; }
      100% { width: 320%; height: 320%; opacity: 0; }
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: clamp(10px, 2.5vw, 12px);
      letter-spacing: 0.12em;
      color: var(--muted);
      text-transform: uppercase;
      text-align: center;
    }

    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--red);
      flex-shrink: 0;
      animation: blink 1.2s step-start infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    .viewer-badge {
      display: flex;
      align-items: center;
      gap: 7px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 100px;
      padding: clamp(6px, 1.5vw, 8px) clamp(12px, 3vw, 16px);
      font-size: clamp(10px, 2.4vw, 12px);
      letter-spacing: 0.1em;
      color: #666;
      text-transform: uppercase;
    }

    .viewer-badge svg {
      width: 13px; height: 13px;
      fill: #666;
      flex-shrink: 0;
    }

    .corner {
      position: fixed;
      font-size: 10px;
      letter-spacing: 0.14em;
      color: #2a2a2a;
      font-family: 'DM Sans', monospace;
      text-transform: uppercase;
      z-index: 5;
    }
    .corner.tl { top: 18px; left: 20px; }
    .corner.tr { top: 18px; right: 20px; }
    .corner.bl { bottom: 18px; left: 20px; }
    .corner.br { bottom: 18px; right: 20px; }

    /* Reset button styles */
    .live-btn {
      border: none;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
    }
    @media (min-width: 600px) {
      .container { max-width: 560px; }
      .live-btn { width: min(340px, 70vw); }
    }

    /* Desktop */
    @media (min-width: 1024px) {
      .container { max-width: 640px; }
      .live-btn { width: min(380px, 60vw); }
    }

    /* Very small phones */
    @media (max-width: 360px) {
      .corner { display: none; }
      .container { gap: 20px; }
      .live-btn { width: 88vw; }
    }

    /* Landscape mobile */
    @media (max-height: 500px) and (orientation: landscape) {
      .container { gap: 14px; }
      .divider { height: 16px; }
      .brand { font-size: 42px; }
      .corner.bl, .corner.br { display: none; }
    }
  </style>
</head>
<body>

  <span class="corner tl">Stream v1.0</span>
  <span class="corner tr">HD · 1080p</span>
  <span class="corner bl">Owncast</span>
  <span class="corner br" id="clock"></span>

  <div class="container">
    <div>
      <div class="brand">Watch <span>Live</span></div>
      <div class="tagline">Live Broadcast — Join Now</div>
    </div>

    <div class="divider"></div>

    <button class="live-btn" id="liveBtn" onclick="goLive()"
      oncontextmenu="return false"
      ontouchstart="startHold(event)"
      ontouchend="cancelHold()"
      ontouchmove="cancelHold()">
      <span class="live-dot"></span>
      LIVE
    </button>

    <div class="status">
      <span class="status-dot"></span>
      Stream is live · Tap to watch
    </div>

    <div class="viewer-badge">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zm0 12.5c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
      </svg>
      Open to all viewers
    </div>
  </div>

  <script>
    // Clock
    function updateClock() {
      document.getElementById('clock').textContent =
        new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }
    updateClock();
    setInterval(updateClock, 1000);

    // Hidden stream URL — not visible in HTML source easily
    const _s = atob('aHR0cDovLzEzOS4xODAuMTU2LjExNjo4MDgw');

    // Block right-click everywhere
    document.addEventListener('contextmenu', e => e.preventDefault());

    // Block long press showing link
    let holdTimer;
    function startHold(e) {
      holdTimer = setTimeout(() => e.preventDefault(), 300);
    }
    function cancelHold() {
      clearTimeout(holdTimer);
    }

    // Navigate on click
    function goLive() {
      window.open(_s, '_blank', 'noopener');
    }
  </script>
</body>
</html>
